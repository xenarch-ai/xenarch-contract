[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.20"

remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "forge-std/=lib/forge-std/src/",
]

[fmt]
line_length = 120
tab_width = 4
bracket_spacing = false

[rpc_endpoints]
base-sepolia = "${BASE_SEPOLIA_RPC_URL}"
base-mainnet = "${BASE_MAINNET_RPC_URL}"

[etherscan]
base-sepolia = { key = "${BASESCAN_API_KEY}", chain = "base-sepolia" }
base-mainnet = { key = "${BASESCAN_API_KEY}", chain = "base" }
